name: pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
# Pages 不允许并发部署：连续 push 时取消旧的，只跑最新一次
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
